name: CI — Backend & Frontend

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Backend: lint + test
  # ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with pytest
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "memory"
          SECRET_KEY: "ci-test-secret-key-32-bytes-long!!"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          BASE_URL: "http://localhost:8000"
          FRONTEND_URL: "http://localhost:3000"
          ENVIRONMENT: "development"
        run: |
          python -m pytest --tb=short -q

  # ─────────────────────────────────────────────────────────────────
  # Frontend: lint + type-check + build
  # ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        env:
          # Use a placeholder API URL for the build — Vercel will inject the real one at deploy time
          NEXT_PUBLIC_API_URL: "https://placeholder.railway.app"
        run: npm run build
