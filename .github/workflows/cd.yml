name: CD — Deploy to Railway & Vercel

on:
  push:
    branches: ["main"]

# Prevent concurrent deployments from overlapping
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Guard: CI must pass first
  # ─────────────────────────────────────────────────────────────────
  ci-gate:
    name: Wait for CI to pass
    uses: ./.github/workflows/ci.yml

  # ─────────────────────────────────────────────────────────────────
  # Backend: deploy to Railway
  # ─────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach

  # ─────────────────────────────────────────────────────────────────
  # Frontend: deploy to Vercel
  # ─────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --token=$VERCEL_TOKEN
