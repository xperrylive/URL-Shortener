version: "3.9"

# ─────────────────────────────────────────────────────────────────
# URL Shortener — Local Development Stack
# Services: FastAPI backend, PostgreSQL, Redis
# ─────────────────────────────────────────────────────────────────

services:
  # ── FastAPI Application ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urlshortener_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app           # hot-reload: mount source code
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL + REDIS_URL to use docker-compose service names
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/urlshortener
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: urlshortener_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortener
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: urlshortener_redis
    command: redis-server --save "" --appendonly no  # no persistence in dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
